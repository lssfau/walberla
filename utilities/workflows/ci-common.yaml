variables:
  CI_CONTAINER_REPOSITORY: i10git.cs.fau.de:5005/ci/images/spack-stable-bincache

default:
  interruptible: true

workflow:
  auto_cancel:
    on_new_commit: interruptible

.testsuite-common:
  before_script:
    # Check software versions
    - $CXX --version
    - cmake --version
    - ccache --version
    - mpirun --version
    - python3 --version
    # Create and activate Python Environment
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install jinja2 lbmpy==1.4 lxml setuptools py-cpuinfo islpy
    # Prepare mesa-pd sources
    - python python/mesa_pd.py -y .
    # Prepare CMake presets
    - >
      python
      utilities/workflows/generateWorkflows.py
      cmake-presets utilities/workflows/ci-workflows.json
      --patch-main-presets-file CMakePresets.json
    # Check envrionment paths
    - echo -e "[Before build] LD_LIBRARY_PATH is:\n$LD_LIBRARY_PATH"
    # Check if variable export in before_scrit affects script section
    - echo "$MPIEXEC_PREFLAGS"
  script:
    # Run Test Workflow
    - cmake --workflow --preset ${cmakePresetName}
  after_script: []
  artifacts:
    reports:
      junit: build/${cmakePresetName}/junit-report.xml

.testsuite-base-linux:
  extends: .testsuite-common
  before_script:
    - !reference [.testsuite-common, before_script]
    - echo "Append setup steps specific for Linux Systems."
    # Install cupy
    - pip install cupy-cuda12x
    # Set MPI environment
    - export MPIEXEC_PREFLAGS="--allow-run-as-root"
  after_script: []
  variables:
    WALBERLA_CI_CUDA_ARCHITECTURES: "60"
  tags:
    - docker
    - cuda
    - cudaComputeCapability6.1

# Patch for clang: LLVM OpenMP runtime libary are not on LD_LIBRARY_PATH
.clang-library-path-patch:
  script:
    - echo "Applying clang library path patch"
    - export LLVM_ROOT=$(dirname $(dirname $(which clang)))
    - export LD_LIBRARY_PATH=$LLVM_ROOT/lib/x86_64-unknown-linux-gnu:$LD_LIBRARY_PATH

.testsuite-base-MacOS:
  extends: .testsuite-common
  tags:
    - macmini
